name = "luldown-worker"
main = "worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# Workers free plan: 100,000 req/day
# Upgrade to Paid ($5/mo) for 10M req/day

# Built-in rate limiting — no code needed
# Cloudflare handles it at the edge, per-IP, globally
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
