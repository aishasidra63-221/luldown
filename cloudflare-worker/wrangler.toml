name = "luldown"
main = "worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# Route luldown.com/api/* directly to this Worker
# So frontend calls /api/info, /api/proxy etc work without WORKER_URL
[[routes]]
pattern = "luldown.com/api/*"
zone_name = "luldown.com"

# Workers free plan: 100,000 req/day
# Upgrade to Paid ($5/mo) for 10M req/day

# ── Keep-alive — pings Render's /health every 10 min so the free-tier ────────
# instance never hits its 15-min idle sleep threshold. Cron Triggers run on
# Cloudflare's free plan at no extra cost.
[triggers]
crons = ["*/10 * * * *"]

# ── Environment Variables ─────────────────────────────────────────────────────
# Set these in Cloudflare Dashboard → Workers → luldown → Settings → Variables
#
# TOKEN_SECRET   — HMAC secret for signed session tokens (bot protection)
# RENDER_URL     — Your Render server URL, e.g. https://luldown.onrender.com
#                  When set, /api/proxy forwards to Render instead of CDN directly.
# PROXY_SECRET   — Shared secret between Worker and Render (prevent proxy abuse).
#                  Must match PROXY_SECRET env var on Render.
#                  Generate with: openssl rand -hex 32

# Built-in rate limiting — no code needed
# Cloudflare handles it at the edge, per-IP, globally
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# ── KV Namespace — globally-replicated metadata cache (title/author/avatar) ──
# Unlike the Cache API (per-datacenter), KV replicates worldwide, so once any
# PoP scrapes a video, every other PoP sees the cached meta too.
# Create it once with:  npx wrangler kv namespace create luldown-meta
# then paste the returned id below (or set it in Cloudflare Dashboard →
# Workers & Pages → luldown → Settings → Bindings → KV Namespace, binding name META_KV).
[[kv_namespaces]]
binding = "META_KV"
id = "d30ad05db4f4451d9bc0e6802fa4799f"
